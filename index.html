<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            display: flex;
            padding: 10px;
            height: 100vh;
        }
        .left{
            width: 60%;
        
        }
        .cart{
            width: 40%;
            background-color: lawngreen;
            display: flex;
            flex-direction: column;
            align-items: center;
            top: 10px;
            left: 10px;
            bottom: 10px;
            right: 10px;
            border-radius: 5px;
            margin-right: 0;
        }
    </style>
</head>
<body>
    <div class="left">
        <span class="s1">🛒 Shopping Cart</span>
        <div class="products" id="products"></div>
    </div>
    <div class="cart">
        <span class="s2">🛍️ Your Cart</span>
        <div class="cart-c" id="cart-c"></div>
        <p class="total">Total:$0</p>
    </div>
</body>
</html>

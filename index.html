<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            display: flex;
            padding: 10px;
            height: 90vh;
        }
        .left{
            width: 60%;
            background-color: #f8f8f8;
        }
        .cart{
            width: 40%;
            background-color: lawngreen;
            text-align: center;
            position: fixed;
            top: 20px;
            bottom: 20px;
            right: 20px;
            border-radius: 10px;
            padding: 20px;
            box-shadow: rgba(0, 0, 0, 0.24) 0px 3px 8px;
           
        }
        .s2{
            font-size: 25px;
            font-weight: bold;

        }
        .total{
            background-color: black;
            color:aliceblue;
            text-align: end;
            padding: 10px;
            margin: 0px 10px;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }
        .s1{
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="left">
        <span class="s1">🛒 Shopping Cart</span>
        <div class="products" id="products"></div>
    </div>
    <div class="cart">
        <span class="s2">🛍️ Your Cart</span>
        <div class="cart-c" id="cart-c"></div>
        <p class="total">Total:$0</p>
    </div>
</body>
</html>
